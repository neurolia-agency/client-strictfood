<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>Story Interactive — Après ton burger, tu prends quoi ?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Oswald:wght@500;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/Users/dorian.gz/dev/Neurolia Agency/client-strictfood/production/posts-stories/stories/_templates/_base/base.css">
  <style>
    .content {
      padding: var(--safe-top) 70px 0;
      align-items: flex-start;
    }

    .question-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 24px;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 6px;
      margin-bottom: 30px;
    }

    .question-text {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 72px;
      color: #fff;
      line-height: 1.15;
      text-transform: uppercase;
      margin-bottom: 50px;
      max-width: 900px;
    }

    .question-text em {
      color: var(--accent);
      font-style: normal;
      filter: brightness(1.2);
    }

    /* Zone reservee au sticker Instagram (sondage/quiz/slider) */
    .sticker-zone {
      width: 900px;
      height: 260px;
      border: 3px dashed rgba(var(--accent-rgb),0.3);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sticker-zone-text {
      font-family: 'DM Sans', sans-serif;
      font-size: 24px;
      color: rgba(255,255,255,0.25);
      text-transform: uppercase;
      letter-spacing: 4px;
    }

    /* Hero image — produit atmospherique en bas du visuel */
    .hero-image {
      width: 950px;
      height: 650px;
      right: 65px;
      bottom: 320px;
      opacity: 0.5;
    }
  </style>
</head>
<body class=" ">

  <!-- Optional product image (dimmed) -->
  <img class="hero-image" src="/Users/dorian.gz/dev/Neurolia Agency/client-strictfood/public/images/photos-references/produits-source/burgers-black/simple-boeuf-black.png" alt="" style="display: block">

  <!-- Gradient overlays -->
  <div class="gradient-top"></div>
  <div class="gradient-bottom"></div>
  <div class="ambient-bottom"></div>

  <!-- Main content -->
  <div class="content">

    <!-- Logo -->
    <div class="logo-container">
      <img src="/Users/dorian.gz/dev/Neurolia Agency/client-strictfood/production/posts-stories/stories/_templates/_base/logo.svg" alt="STRICT FOOD'S">
    </div>

    <div class="question-label">Ton avis</div>

    <div class="question-text text-depth">Après ton burger, tu prends quoi ?</div>

    <!-- Zone ou l'operateur placera le sticker Instagram (sondage/quiz/slider) -->
    <div class="sticker-zone">
      <div class="sticker-zone-text">Zone sticker sondage</div>
    </div>

  </div>
