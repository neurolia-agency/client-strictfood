<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>Story 03 — Option B2 (Split optimisé)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Oswald:wght@500;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="file:///Users/dorian.gz/dev/Neurolia%20Agency/client-strictfood/production/posts-stories/stories/_templates/_base/base.css">
  <style>
    /* === SPLIT LAYOUT v2 === */
    /* Zone haute : devanture plus généreuse (~45% hauteur) */
    .zone-photo {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1020px;
      overflow: hidden;
    }

    .zone-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 75% 45%;
      transform: scale(1.30) translateX(40px) rotate(-0.7deg);
      opacity: 0.75;
      filter: brightness(0.8) sepia(var(--img-sepia)) saturate(var(--img-saturate));
    }

    /* Gradient de transition photo → fond sombre */
    .zone-photo::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 300px;
      background: linear-gradient(to top, var(--bg) 0%, rgba(var(--bg-rgb),0.6) 50%, transparent 100%);
    }

    .split-divider { display: none; }

    /* Zone basse : texte — poussé plus bas, moins de vide */
    .content {
      padding: 1120px 80px 0;
      justify-content: flex-start;
      align-items: center;
      text-align: center;
    }

    .annonce-badge {
      display: inline-block;
      padding: 14px 36px;
      border-radius: 999px;
      background: rgba(var(--accent-rgb),0.22);
      border: 3px solid rgba(var(--accent-rgb),0.5);
      font-family: 'DM Sans', sans-serif;
      font-size: 28px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 5px;
      margin-bottom: 40px;
      filter: brightness(1.15);
    }

    .annonce-headline {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 82px;
      color: #fff;
      line-height: 1.05;
      text-transform: uppercase;
      margin-bottom: 32px;
      max-width: 900px;
    }

    .annonce-headline em {
      color: var(--accent);
      font-style: normal;
      filter: brightness(1.2);
    }

    .divider {
      width: 80px;
      height: 4px;
      background: linear-gradient(to right, transparent, var(--accent), transparent);
      margin: 0 auto 32px;
      border-radius: 2px;
    }

    .annonce-body {
      font-family: 'DM Sans', sans-serif;
      font-size: 32px;
      color: rgba(255,255,255,0.7);
      line-height: 1.55;
      max-width: 800px;
      margin-bottom: 0;
    }

    .annonce-body strong {
      color: #fff;
      font-weight: 600;
    }

    /* Logo au-dessus de la tagline */
    .logo-section {
      position: absolute;
      bottom: 110px;
      left: 70px;
      right: 70px;
      z-index: 10;
      display: flex;
      justify-content: center;
    }

    .logo-section .logo-bottom {
      width: 200px;
      height: auto;
      opacity: 0.7;
    }

    /* Tagline tout en bas — position fixe comme l'original */
    .bottom-section {
      position: absolute;
      bottom: 30px;
      left: 70px;
      right: 70px;
      z-index: 10;
      text-align: center;
    }

    .bottom-section .tagline {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 40px;
      color: #fff;
      line-height: 1.3;
    }
  </style>
</head>
<body>

  <!-- Zone haute : devanture avec enseigne visible -->
  <div class="zone-photo">
    <img src="file:///Users/dorian.gz/dev/Neurolia%20Agency/client-strictfood/public/images/photos-references/contexte/exterieur/devanture.jpeg" alt="">
  </div>

  <!-- Filet de séparation -->
  <div class="split-divider"></div>

  <!-- Zone basse : texte sur fond sombre -->
  <div class="content">

    <div class="annonce-badge">OÙ NOUS TROUVER ?</div>

    <div class="annonce-headline">Chateau <em>Roussillon</em></div>

    <div class="divider"></div>

    <div class="annonce-body mark-tape">88 Chemin de la Roseraie, Perpignan.<br><strong>Mardi au samedi</strong> 11h–14h / 18h–22h<br><strong>Dimanche</strong> 18h–22h · Fermé le lundi</div>

  </div>

  <!-- Logo -->
  <div class="logo-section">
    <img class="logo-bottom" src="file:///Users/dorian.gz/dev/Neurolia%20Agency/client-strictfood/production/posts-stories/stories/_templates/_base/logo.svg" alt="STRICT FOOD'S">
  </div>

  <!-- Tagline — position fixe en bas -->
  <div class="bottom-section">
    <div class="tagline">Le cheat meal qui n'en est pas un</div>
  </div>

</body>
</html>
