<!DOCTYPE html>

  <style>
    .content {
      padding: 200px 70px 160px;
      align-items: flex-start;
    }

    .edu-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 24px;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 6px;
      margin-bottom: 30px;
    }

    .edu-title {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 48px;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 60px;
      max-width: 800px;
    }

    /* Grand chiffre / fait */
    .fact-block {
      margin-bottom: 50px;
    }

    .fact-number {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 200px;
      color: #BF8522;
      line-height: 0.85;
      letter-spacing: -6px;
    }

    .fact-unit {
      font-family: 'Oswald', sans-serif;
      font-weight: 500;
      font-size: 60px;
      color: rgba(255,255,255,0.7);
      text-transform: uppercase;
      letter-spacing: 6px;
    }

    /* Explication */
    .explanation {
      font-family: 'DM Sans', sans-serif;
      font-size: 34px;
      color: rgba(255,255,255,0.75);
      line-height: 1.6;
      max-width: 750px;
      margin-bottom: 50px;
    }

    .spacer { display: none; }

    .product-hero {
      position: absolute;
      bottom: -325px;
      left: 50%;
      transform: translateX(-50%);
      width: 1200px;
      height: 1200px;
      object-fit: contain;
      object-position: center top;
      z-index: 6;
      filter: drop-shadow(0 -10px 40px rgba(0,0,0,0.5)) sepia(0.25) saturate(0.9) brightness(0.85);
      mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,1) 8%, rgba(0,0,0,1) 25%, rgba(0,0,0,0.5) 55%, transparent 78%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,1) 8%, rgba(0,0,0,1) 25%, rgba(0,0,0,0.5) 55%, transparent 78%);
    }

    /* Blur on bottom of burger photo */
    .burger-blur {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 250px;
      z-index: 7;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      mask-image: linear-gradient(to bottom, transparent 0%, black 40%, black 100%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 40%, black 100%);
    }

    /* Soft gradient overlay to blend the two photo zones */
    .zone-blend {
      position: absolute;
      left: 0;
      right: 0;
      top: 750px;
      height: 400px;
      z-index: 5;
      background: linear-gradient(to bottom, transparent 0%, var(--bg) 35%, var(--bg) 65%, transparent 100%);
    }

    .explanation strong {
      color: #fff;
      font-weight: 600;
    }

    /* Comparaison VS (optionnel) */
    .vs-block {
      display: flex;
      gap: 30px;
      width: 100%;
      margin-bottom: 50px;
    }

    .vs-item {
      flex: 1;
      padding: 35px;
      border-radius: 20px;
      text-align: center;
    }

    .vs-item.ours {
      background: rgba(191,133,34,0.12);
      border: 2px solid rgba(191,133,34,0.3);
    }

    .vs-item.theirs {
      background: rgba(255,255,255,0.04);
      border: 2px solid rgba(255,255,255,0.1);
    }

    .vs-item .vs-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 22px;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 15px;
    }

    .vs-item.ours .vs-label { color: rgba(191,133,34,0.7); }

    .vs-item .vs-value {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 80px;
      line-height: 1;
      margin-bottom: 8px;
    }

    .vs-item .vs-value .vs-g {
      font-size: 44px;
      font-weight: 500;
      margin-left: 4px;
    }

    .vs-item.ours .vs-value { color: #BF8522; }
    .vs-item.theirs .vs-value { color: rgba(255,255,255,0.5); }

    .vs-item .vs-unit {
      font-family: 'DM Sans', sans-serif;
      font-size: 26px;
      color: rgba(255,255,255,0.65);
      letter-spacing: 2px;
    }

    .vs-separator {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Oswald', sans-serif;
      font-size: 36px;
      color: rgba(255,255,255,0.3);
      font-weight: 700;
    }

    /* Override bg for this story — zoomed crop on 2 air fryers */
    .gradient-left {
      background: linear-gradient(to right, var(--bg) 0%, rgba(20,18,16,0.9) 35%, rgba(20,18,16,0.5) 65%, transparent 85%);
    }
    .bg-image {
      top: 40px;

      mask-composite: unset;
      -webkit-mask-composite: unset;
    }
