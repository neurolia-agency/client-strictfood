<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>Story — Le Parmesan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Oswald:wght@500;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="file:///Users/dorian.gz/dev/Neurolia%20Agency/client-strictfood/production/posts-stories/stories/_templates/_base/base.css">
  <style>
    /* ===== VIBRANT MOOD VARIANTS ===== */
    :root {
      --vibrant-bg-top: #1a1108;
      --vibrant-bg-bottom: #3a2510;
      --vibrant-bg-center: #4a3820;
    }

    body.mood-grenat {
      --vibrant-bg-top: #1a0d0c;
      --vibrant-bg-bottom: #4a1510;
      --vibrant-bg-center: #5a2018;
    }

    body.mood-feuille {
      --vibrant-bg-top: #0d1a12;
      --vibrant-bg-bottom: #1a3a25;
      --vibrant-bg-center: #1e4a30;
    }

    /* ===== BODY — RADIAL GRADIENT BACKGROUND ===== */
    body {
      background: radial-gradient(circle at 50% 35%, var(--vibrant-bg-center) 0%, var(--vibrant-bg-top) 25%, var(--vibrant-bg-bottom) 100%);
      position: relative;
    }

    /* Remove default gradient overlays */
    .gradient-top,
    .gradient-bottom,
    .gradient-left,
    .accent-line,
    .zone-blend {
      display: none;
    }

    /* ===== CONTENT LAYOUT ===== */
    .content {
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* ===== ARTISAN BADGE ===== */
    .artisan-badge {
      position: absolute;
      top: 140px;
      left: 70px;
      right: 70px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      z-index: 18;
    }

    .artisan-name {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 52px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 8px;
      filter: brightness(1.15);
    }

    .artisan-locality {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 28px;
      color: rgba(255, 255, 255, 0.8);
      letter-spacing: 5px;
      text-transform: uppercase;
    }

    .artisan-desc {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 36px;
      color: #fff;
      letter-spacing: 2px;
      margin-top: 8px;
      text-transform: uppercase;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    /* ===== INGREDIENT HERO IMAGE ===== */
    .hero-zone {
      position: absolute;
      top: 100px;
      left: 0;
      right: 0;
      height: 1080px;
      z-index: 10;
      overflow: hidden;
    }

    .ingredient-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 78%;
      filter: brightness(1.05) saturate(1.15);
      mask-image: linear-gradient(to bottom, transparent 0%, black 12%, black 60%, transparent 95%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 12%, black 60%, transparent 95%);
    }

    /* ===== BOTTOM TEXT ZONE ===== */
    .bottom-zone {
      position: absolute;
      top: 970px;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(26, 17, 8, 0.98) 0%, rgba(26, 17, 8, 0.95) 40%, rgba(26, 17, 8, 0.7) 70%, transparent 100%);
      z-index: 12;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      padding: 120px 70px 40px;
      text-align: center;
    }

    .bottom-spacer {
      flex: 1;
    }

    .footer-logo {
      margin-top: 24px;
    }

    .footer-logo img {
      width: 160px;
      height: auto;
      opacity: 0.6;
    }

    .ingredient-name {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 73px;
      color: #ffffff;
      line-height: 1.1;
      letter-spacing: -2px;
      text-transform: uppercase;
      text-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);
      margin-bottom: 16px;
    }

    .key-fact {
      font-family: 'DM Sans', sans-serif;
      font-size: 29px;
      color: rgba(255, 255, 255, 0.85);
      letter-spacing: 1px;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .key-fact strong {
      color: var(--accent);
      font-weight: 600;
    }

    .in-product {
      font-family: 'DM Sans', sans-serif;
      font-size: 25px;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .divider-line {
      width: 100px;
      height: 3px;
      background: var(--accent);
      margin-bottom: 24px;
      border-radius: 2px;
      opacity: 0.8;
    }

    .tagline-focus {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 38px;
      color: #ffffff;
      line-height: 1.4;
      letter-spacing: 1px;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .tagline-focus em {
      color: var(--accent);
      font-style: italic;
      filter: brightness(1.15);
    }
  </style>
</head>
<body class="mood-feuille">

  <!-- Main content wrapper -->
  <div class="content">

    <!-- ARTISAN BADGE -->
    <div class="artisan-badge">
      <div class="artisan-name">MYFITCHEESE</div>
      <div class="artisan-locality">Perpignan</div>
      <div class="artisan-desc">Fromage hyperprotéiné artisanal</div>
    </div>

    <!-- HERO: Large Ingredient Photo -->
    <div class="hero-zone">
      <img class="ingredient-image" src="file:///Users/dorian.gz/dev/Neurolia%20Agency/client-strictfood/public/contenu-instagram/strictfoods/2025-10-03_15-57-14_UTC_7.jpg" alt="Le Parmesan">
    </div>

    <!-- BOTTOM ZONE -->
    <div class="bottom-zone">
      <div class="ingredient-name">Le Parmesan</div>

      <div class="key-fact"><strong>Hyperprotéiné</strong>, fondant, sans compromis.<br>Le fromage qui change chaque burger.</div>

      <div class="in-product">Dans tous nos burgers et wraps</div>

      <div class="bottom-spacer"></div>

      <div class="divider-line"></div>

      <div class="tagline-focus">Le cheat meal qui n'en est pas un</div>

      <div class="footer-logo">
        <img src="file:///Users/dorian.gz/dev/Neurolia%20Agency/client-strictfood/production/posts-stories/stories/_templates/_base/logo.svg" alt="STRICT FOOD'S">
      </div>
    </div>

  </div>

</body>
</html>
