<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>Story Annonce — Chateau Roussillon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Oswald:wght@500;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="file:///Users/dorian.gz/dev/Neurolia%20Agency/client-strictfood/production/posts-stories/stories/_templates/_base/base.css">
  <style>
    .content {
      padding: 0 80px;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .annonce-badge {
      display: inline-block;
      padding: 12px 30px;
      border-radius: 999px;
      background: rgba(191,133,34,0.15);
      border: 2px solid rgba(191,133,34,0.35);
      font-family: 'DM Sans', sans-serif;
      font-size: 22px;
      font-weight: 600;
      color: #BF8522;
      text-transform: uppercase;
      letter-spacing: 5px;
      margin-bottom: 50px;
    }

    .annonce-headline {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 90px;
      color: #fff;
      line-height: 1.05;
      text-transform: uppercase;
      margin-bottom: 40px;
      max-width: 900px;
    }

    .annonce-headline em {
      color: #BF8522;
      font-style: normal;
    }

    .divider {
      width: 80px;
      height: 4px;
      background: linear-gradient(to right, transparent, #BF8522, transparent);
      margin: 0 auto 40px;
      border-radius: 2px;
    }

    .annonce-body {
      font-family: 'DM Sans', sans-serif;
      font-size: 34px;
      color: rgba(255,255,255,0.7);
      line-height: 1.6;
      max-width: 800px;
      margin-bottom: 60px;
    }

    .annonce-body strong {
      color: #fff;
      font-weight: 600;
    }

    .annonce-cta {
      display: inline-block;
      padding: 22px 50px;
      border-radius: 999px;
      background: #BF8522;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #141210;
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    /* Image en fond si fournie */
    .annonce-bg {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.15;
    }

    .gradient-center {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(ellipse at center, rgba(20,18,16,0.4) 0%, rgba(20,18,16,0.97) 65%);
      z-index: 3;
    }
  </style>
</head>
<body>

  <!-- Optional background image -->
  <img class="annonce-bg" src="file:///Users/dorian.gz/dev/Neurolia%20Agency/client-strictfood/public/images/photos-references/contexte/exterieur/devanture.jpeg" alt="" style="display: block">

  <!-- Gradient overlay -->
  <div class="gradient-center"></div>

  <!-- Main content -->
  <div class="content">

    <!-- Logo -->
    <div class="logo-container" style="margin-bottom: 60px;">
      <img src="file:///Users/dorian.gz/dev/Neurolia%20Agency/client-strictfood/production/posts-stories/stories/_templates/_base/logo.svg" alt="STRICT FOOD'S">
    </div>

    <div class="annonce-badge">NOUS TROUVER</div>

    <div class="annonce-headline">Chateau <em>Roussillon</em></div>

    <div class="divider"></div>

    <div class="annonce-body">88 Chemin de la Roseraie, Perpignan. Ouvert du <strong>mardi au samedi</strong>, service midi et soir.</div>

    <div class="annonce-cta" style="display: none">—</div>

  </div>

  <!-- Bottom -->
  <div class="bottom-section">
    <div class="tagline">Le cheat meal qui n'en est pas un</div>
  </div>

</body>
</html>
