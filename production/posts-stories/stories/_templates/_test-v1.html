  <style>
    :root { --vibrant-bg-top: #1a1108; --vibrant-bg-bottom: #3a2510; --vibrant-bg-center: #4a3820; }
    body.mood-grenat { --vibrant-bg-top: #1a0d0c; --vibrant-bg-bottom: #4a1510; --vibrant-bg-center: #5a2018; }
    body.mood-feuille { --vibrant-bg-top: #0d1a12; --vibrant-bg-bottom: #1a3a25; --vibrant-bg-center: #1e4a30; }
    body { background: radial-gradient(circle at 50% 35%, var(--vibrant-bg-center) 0%, var(--vibrant-bg-top) 25%, var(--vibrant-bg-bottom) 100%); position: relative; }
    .gradient-top, .gradient-bottom, .gradient-left, .accent-line, .zone-blend { display: none; }
    .content { padding: 0; display: flex; flex-direction: column; height: 100%; }
    .header-zone { position: absolute; top: 60px; left: 70px; right: 70px; z-index: 20; }
    .logo-container { margin-bottom: 0; }
    .logo-container img { width: 220px; height: auto; opacity: 0.95; }
    .hero-zone { position: absolute; top: 120px; left: 0; right: 0; height: 960px; z-index: 10; overflow: hidden; }
    .product-image { width: 100%; height: 100%; object-fit: cover; object-position: center 40%; filter: brightness(1.05) saturate(1.15); mask-image: linear-gradient(to bottom, transparent 0%, black 8%, black 65%, transparent 100%); -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 8%, black 65%, transparent 100%); }
    .info-zone { position: absolute; top: 1020px; bottom: 0; left: 0; right: 0; z-index: 15; display: flex; flex-direction: column; padding: 0 70px; background: linear-gradient(to top, rgba(26,17,8,0.98) 0%, rgba(26,17,8,0.95) 25%, rgba(26,17,8,0.7) 60%, transparent 100%); }
    .product-name { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 78px; color: #ffffff; line-height: 0.95; letter-spacing: -2px; text-transform: uppercase; text-shadow: 0 4px 12px rgba(0,0,0,0.4); margin-bottom: 12px; }
    .product-subtitle { font-family: 'DM Sans', sans-serif; font-size: 32px; color: rgba(255,255,255,0.7); letter-spacing: 1px; margin-bottom: 30px; }
    .stats-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; }
    .macro-star { display: flex; align-items: baseline; gap: 12px; }
    .macro-star-value { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 90px; color: var(--accent); line-height: 0.85; filter: brightness(1.2); }
    .macro-star-unit { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 28px; color: rgba(255,255,255,0.8); letter-spacing: 1px; text-transform: uppercase; }
    .badge-secondary { display: inline-block; padding: 16px 28px; background: rgba(var(--accent-rgb), 0.18); border: 2px solid var(--accent); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 26px; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; filter: brightness(1.15); flex-shrink: 0; }
    .bottom-tagline { text-align: center; margin-top: auto; padding: 0 0 30px; }
    .divider-line { width: 100px; height: 3px; background: var(--accent); margin-bottom: 30px; border-radius: 2px; opacity: 0.8; }
    .tagline-vitrine { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 38px; color: #ffffff; line-height: 1.4; letter-spacing: 1px; text-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .tagline-vitrine em { color: var(--accent); font-style: italic; filter: brightness(1.15); }
    .footer-logo { text-align: center; padding-bottom: 60px; }
    .footer-logo img { width: 140px; height: auto; opacity: 0.35; }
