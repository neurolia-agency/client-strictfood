<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>Story Interactive — {{QUESTION}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Oswald:wght@500;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="_base/base.css">
  <style>
    .content {
      padding: var(--safe-top) 70px 0;
      align-items: flex-start;
    }

    .question-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 24px;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 6px;
      margin-bottom: 30px;
    }

    .question-text {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 72px;
      color: #fff;
      line-height: 1.15;
      text-transform: uppercase;
      margin-bottom: 50px;
      max-width: 900px;
    }

    .question-text em {
      color: var(--accent);
      font-style: normal;
      filter: brightness(1.2);
    }

    /* Zone reservee au sticker Instagram (sondage/quiz/slider) */
    .sticker-zone {
      width: 900px;
      height: 260px;
      border: 3px dashed rgba(var(--accent-rgb),0.3);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sticker-zone-text {
      font-family: 'DM Sans', sans-serif;
      font-size: 24px;
      color: rgba(255,255,255,0.25);
      text-transform: uppercase;
      letter-spacing: 4px;
    }

    /* ===== MODE SINGLE — hero image unique (questions generales) ===== */
    .hero-image {
      width: 1300px;
      height: 750px;
      left: 50%;
      transform: translateX(-50%);
      bottom: 300px;
      opacity: 0.85;
      object-fit: cover;
      mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,1) 15%, rgba(0,0,0,1) 75%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,1) 15%, rgba(0,0,0,1) 75%, transparent 100%);
    }

    /* ===== MODE VS — dual product images (choix A vs B) ===== */
    .vs-typo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      width: 100%;
      margin-bottom: 30px;
    }

    .vs-name {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 90px;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 4px;
    }

    .vs-separator {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 60px;
      color: var(--accent);
      filter: brightness(1.2);
      letter-spacing: 2px;
    }

    .product-left,
    .product-right {
      position: absolute;
      width: 620px;
      height: 620px;
      object-fit: cover;
      z-index: 4;
      opacity: 0.88;
      filter: brightness(1.05) saturate(1.1);
    }

    .product-left {
      left: -40px;
      bottom: 270px;
      mask-image: radial-gradient(ellipse 90% 90% at 45% 50%, rgba(0,0,0,1) 30%, rgba(0,0,0,0.5) 60%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse 90% 90% at 45% 50%, rgba(0,0,0,1) 30%, rgba(0,0,0,0.5) 60%, transparent 80%);
    }

    .product-right {
      right: -40px;
      bottom: 250px;
      mask-image: radial-gradient(ellipse 90% 90% at 55% 50%, rgba(0,0,0,1) 30%, rgba(0,0,0,0.5) 60%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse 90% 90% at 55% 50%, rgba(0,0,0,1) 30%, rgba(0,0,0,0.5) 60%, transparent 80%);
    }

    /* Ajustements en mode VS */
    body.vs-mode .question-text {
      margin-bottom: 20px;
    }
  </style>
</head>
<body class="{{MOOD_CLASS}} {{IMG_CLASS}} {{VS_CLASS}}">

  <!-- Mode single : hero image unique (questions generales) -->
  <img class="hero-image" src="{{BG_IMAGE_PATH}}" alt="" style="display: {{SHOW_IMAGE}}">

  <!-- Mode VS : dual product images (choix produit A vs B) -->
  <img class="product-left" src="{{PRODUCT_A_IMAGE}}" alt="" style="display: {{SHOW_VS}}">
  <img class="product-right" src="{{PRODUCT_B_IMAGE}}" alt="" style="display: {{SHOW_VS}}">

  <!-- Gradient overlays -->
  <div class="gradient-top"></div>
  <div class="gradient-bottom"></div>
  <div class="ambient-bottom"></div>

  <!-- Main content -->
  <div class="content">

    <!-- Logo -->
    <div class="logo-container">
      <img src="_base/logo.svg" alt="STRICT FOOD'S">
    </div>

    <div class="question-label">Ton avis</div>

    <div class="question-text text-depth">{{QUESTION}}</div>

    <!-- Bloc VS typographique (mode VS uniquement) -->
    <div class="vs-typo text-depth" style="display: {{SHOW_VS}}">
      <div class="vs-name">{{PRODUCT_A_LABEL}}</div>
      <div class="vs-separator">VS</div>
      <div class="vs-name">{{PRODUCT_B_LABEL}}</div>
    </div>

    <!-- Zone ou l'operateur placera le sticker Instagram (sondage/quiz/slider) -->
    <div class="sticker-zone">
      <div class="sticker-zone-text">Zone sticker sondage</div>
    </div>

  </div>

  <!-- Bottom -->
  <div class="bottom-section">
    <div class="tagline">{{TAGLINE}}</div>
  </div>

</body>
</html>
