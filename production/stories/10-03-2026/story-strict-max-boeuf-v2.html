<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>Story — STRICT MAX Boeuf</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Oswald:wght@500;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1920px;
      background: #141210;
      overflow: hidden;
      position: relative;
      font-family: 'DM Sans', sans-serif;
    }

    /* ===== BACKGROUND IMAGE (zoomed crop — texture/relief) ===== */
    .bg-image {
      position: absolute;
      top: -60px;
      right: -100px;
      width: 2800px;
      height: 1100px;
      object-fit: cover;
      object-position: 75% 30%;
      opacity: 0.4;
      mask-image: linear-gradient(to left, rgba(0,0,0,1) 15%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0) 65%),
                  linear-gradient(to top, transparent 0%, rgba(0,0,0,1) 20%, rgba(0,0,0,1) 80%, rgba(0,0,0,0.5) 100%);
      -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,1) 15%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0) 65%),
                          linear-gradient(to top, transparent 0%, rgba(0,0,0,1) 20%, rgba(0,0,0,1) 80%, rgba(0,0,0,0.5) 100%);
      mask-composite: intersect;
      -webkit-mask-composite: source-in;
    }

    /* ===== BURGER IMAGE (entier — hero, bien visible) ===== */
    .burger-image {
      position: absolute;
      bottom: 180px;
      right: 0;
      width: 1400px;
      height: 900px;
      object-fit: cover;
      object-position: 60% 35%;
      z-index: 5;
      filter: drop-shadow(-30px -20px 60px rgba(0,0,0,0.5));
    }

    /* ===== GRADIENT OVERLAYS ===== */
    .gradient-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 350px;
      background: linear-gradient(to bottom, #141210 0%, #14121099 55%, transparent 100%);
      z-index: 3;
    }

    .gradient-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 380px;
      background: linear-gradient(to top, #141210 0%, #141210cc 50%, transparent 100%);
      z-index: 3;
    }

    .gradient-left {
      position: absolute;
      top: 0; bottom: 0; left: 0;
      width: 650px;
      background: linear-gradient(to right, #141210 0%, #141210ee 50%, transparent 100%);
      z-index: 3;
    }

    /* ===== CONTENT ===== */
    .content {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      display: flex;
      flex-direction: column;
      padding: 250px 70px 0;
    }

    /* ===== LOGO ===== */
    .logo-container {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 60px;
    }

    .logo-container svg {
      width: 280px;
      height: auto;
      opacity: 0.9;
    }

    /* ===== PRODUCT NAME ===== */
    .product-name {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 42px;
      color: #BF8522;
      text-transform: uppercase;
      letter-spacing: 6px;
      margin-bottom: 10px;
    }

    .product-subtitle {
      font-family: 'DM Sans', sans-serif;
      font-size: 28px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 2px;
      margin-bottom: 80px;
    }

    /* ===== CALORIES BLOCK ===== */
    .calories-block {
      margin-bottom: 50px;
    }

    .calories-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 24px;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 0;
    }

    .calories-number {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 170px;
      color: #fff;
      line-height: 0.85;
      letter-spacing: -4px;
    }

    .calories-unit {
      font-family: 'Oswald', sans-serif;
      font-weight: 500;
      font-size: 48px;
      color: #BF8522;
      text-transform: uppercase;
      letter-spacing: 10px;
      margin-top: -3px;
    }

    /* ===== MACROS BAR ===== */
    .macros-bar {
      display: flex;
      gap: 40px;
      margin-bottom: 70px;
      padding: 30px 0;
      border-top: none;
      border-bottom: none;
    }

    .macro-item {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .macro-value {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 64px;
      color: #fff;
      line-height: 1;
    }

    .macro-value span {
      font-size: 36px;
      font-weight: 500;
      color: rgba(255,255,255,0.6);
    }

    .macro-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 22px;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-top: 4px;
    }

    .macro-highlight .macro-value {
      color: #BF8522;
    }

    .macro-highlight .macro-label {
      color: rgba(191, 133, 34, 0.7);
    }

    /* ===== BENEFITS ===== */
    .benefits {
      display: flex;
      flex-direction: column;
      gap: 22px;
      margin-bottom: auto;
    }

    .benefit-item {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .benefit-icon {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      background: rgba(191, 133, 34, 0.12);
      border: 1.5px solid rgba(191, 133, 34, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .benefit-icon svg {
      width: 26px;
      height: 26px;
    }

    .benefit-text {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 30px;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      line-height: 1.3;
    }

    .benefit-text strong {
      color: #BF8522;
      font-weight: 700;
    }

    /* ===== BOTTOM TAGLINE ===== */
    .bottom-section {
      position: absolute;
      bottom: 200px;
      left: 70px;
      right: 70px;
      z-index: 10;
      text-align: center;
    }

    .tagline {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 40px;
      color: #fff;
      line-height: 1.3;
      margin-bottom: 16px;
    }

    .tagline em {
      font-style: italic;
      color: #BF8522;
    }

    .swipe-up {
      font-family: 'DM Sans', sans-serif;
      font-size: 22px;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-top: 20px;
    }

    .swipe-up .arrow {
      display: block;
      margin: 10px auto 0;
      width: 30px;
      height: 30px;
      border-left: 2.5px solid rgba(191, 133, 34, 0.5);
      border-top: 2.5px solid rgba(191, 133, 34, 0.5);
      transform: rotate(45deg);
    }

    /* ===== DECORATIVE LINE ===== */
    .accent-line {
      position: absolute;
      left: 70px;
      top: 280px;
      width: 4px;
      height: 900px;
      background: linear-gradient(to bottom, transparent, rgba(191,133,34,0.3) 20%, rgba(191,133,34,0.15) 80%, transparent);
      z-index: 5;
      border-radius: 2px;
    }
  </style>
</head>
